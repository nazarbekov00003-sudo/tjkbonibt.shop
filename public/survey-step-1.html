<!DOCTYPE html>
<html lang="tg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survey Step 1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-survey-step="1">
    <div class="page-shell"></div>

    <main class="page">
      <section class="step-card survey-card">
        <div class="survey-progress">
          <span class="survey-progress-active"></span>
          <span></span>
          <span></span>
        </div>

        <div class="logo-wrap step-logo" aria-label="IBT logo">
          <img class="logo-image" src="/img/logo.png" alt="IBT logo" />
        </div>

        <header class="hero-copy step-copy">
          <h1>Ба дӯстон, шиносон ё хешовандони худ бонки моро тавсия медодед?</h1>
          <p class="subtitle">Як ҷавобро интихоб кунед, то ба қадами оянда гузарем.</p>
        </header>

        <form class="step-form survey-form" data-next="/survey-step-2.html">
          <label class="survey-option">
            <input type="radio" name="answer" value="18-24" required />
            <span>Бале</span>
          </label>
          <label class="survey-option">
            <input type="radio" name="answer" value="25-34" />
            <span>Эҳтимол</span>
          </label>
          <label class="survey-option">
            <input type="radio" name="answer" value="35-44" />
            <span>Фикр намекунам, ки тавсия диҳам</span>
          </label>

          <button class="submit-btn secondary-btn submit-btn is-ready" type="submit">Давом додан</button>
          <p class="status" id="statusMessage" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="/survey.js"></script>
  </body>
  </html>
