<!DOCTYPE html>
<html lang="tg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IBT Residence Year</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-screen="flow" data-step="residence_year">
    <div class="page-shell"></div>

    <main class="page">
      <section class="step-card">
        <a class="back-link" href="/">←</a>

        <div class="logo-wrap step-logo" aria-label="IBT logo">
          <img class="logo-image" src="/img/logo.png" alt="IBT logo" />
        </div>

        <header class="hero-copy step-copy">
          <h1>Соли зистро ворид кунед</h1>
          <p class="subtitle">
            Соле, ки аз он вақт дар ин ҷой зиндагӣ мекунед, ворид намоед
          </p>
        </header>

        <form class="step-form" id="stepForm">
          <label class="field-label" for="stepValue">Соли зист</label>
          <div class="phone-field single-field">
            <input
              id="stepValue"
              name="value"
              type="text"
              inputmode="numeric"
              placeholder="2020"
              required
            />
          </div>
          <p class="field-error" id="fieldError"></p>

          <button class="submit-btn secondary-btn is-inactive" type="submit" id="submitStepButton" disabled>
            Ирсол кардан
          </button>
          <p class="status" id="statusMessage" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="/flow.js"></script>
  </body>
  </html>
